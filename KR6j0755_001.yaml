body:
  text: 三峰法藏著不參禪無以悟入不悟入無以深入法門入法不盡何以忘法忘法不了何以作用非作用大無以相應不相應極何以利生利生多門凡一門皆具已上七事予甞于𦦨口施食一法見之其法名曰瑜伽梵語瑜伽此云相應以身口意三業與所悟之法相應故能大用現前興廣利道葢名稱其實也大凡參禪在于徹悟悟道須徹宗旨宗旨一透則無量差別法門皆同其旨趣故施食一法從體起用只在此中具𠶹哩字之心體體上現金緣𠽾字之華嚴法界法界化成宮殿以合大千國土但此體不易到得故先從唵㘕字從頂臍兩頭坐斷手到心到口到以點淨法界法界者具法之界也法界既淨其體已具而未得其用故以花米觀成為諸法之種然法有主賓慈威而已故以鈴談慈以杵用威賓主並運建立道場一切音樂皆說法之正語葢出於鈴也於鈴悟得便解呪語於杵悟得便解呪力不思議事於此成矣欲成最上法須從十二因緣入大乘無性之門入其初門便從無性緣生入菩薩雙照雙遮輥入佛地故五方五佛顯法界之主以建法界法界地成本是性中淨土廣以正語音聲之觀音震之以六字心呪呪之於法界之無量界中拈示一界以見大意然界從此出此中一念作用之動便為風輪動則流注故為水輪流極必堅故為金輪堅極必濁故為土輪故建立輪圍鐵圍大須彌小須彌四大洲八輔洲粟散洲上覆眾寶傘下立尊勝幢而輪王八寶具焉日月星天具焉此金剛地從真性中之勝金剛地基于吽字湧出者也豈無明建立者哉於此性地上一一從花米中拈出宮殿園林池沼傘葢幢旛等物皆自性法中流出以為供養所有香花燈塗果樂以表六波羅蜜為大作用以鈴杵之正語遍告此中即正語中拈出三毒皷為三尖火輪拈出寶錯為如意種子於此中想黃色得浪字放出黃光以表正中利益之色照拂有情一念回光本字變成寶生佛手結施印持寶錯廣成施益凡欲施益施心即是障緣必當以殺佛殺祖手段除之故先以三尖火燒一遍而入空然空亦障也故以雙金剛之毒拳正交放火再燒之然空盡亦障也復以外又交力之火燒之空盡既了了亦了在非障而何故以金剛內𦦨燒之大凡一法立便有四句法之魔須用四句法之力火燒之始見本體之大相此相本從𠶹哩心出無心皆從心中一念𠽾字種成就法界故曰於空性中想𠽾𠽾然𠽾無始而無始之音從阿來尚無無中生有故萬法從吽而出故成十方世界以流出花香等也然此花香等從吽字起字須竭不可到之天天固有母母有四臂雙起雙落上二捧花下二輪交妙在四臂輪交雙開雙結了不可得而成此法豈凡夫心識能到者哉到不得處力用嚴重故有唵字力用始全而之法界備矣故上卷諸法不過細顯大輪明王中事耳其印外指交而內指向外藏正顯此法界之密也然此法界既成則界中之心佛出現故以雙金剛之毒拳前後四指力交此心之密處也密處微動𠶹哩放光至色究竟處請本身智觀音來易我色身此見心光照徹諸色凡一色上必至究竟謂之事究竟處此即我本身觀音也請來易我身者我非我矣竟承當自己起觀音慢自己為大法界主即盧舍那位通身坐自在般若中故嘿念心經而我坐下有大蓮花千百億葉葉葉有佛出現各各化佛統諸弟子護神面面向我我身四面面面向佛主伴同會然諸佛即我化身故觀音放光以請諸佛也佛至則伸六供以供養之此普賢行也乃運頂結之心以為供獻表敬田也纔興供心即心魔也故仍以三尖三印燒之以變空之無相奉之皆不出吽唵者也雖已變空未入禪定猶屬見慧之福須入聞思修定以圓大慧故於定中閉目澄心觀想身中於肉團心尖上想一紅色𠳐字變成八葉雜色蓮花花上想白色阿字變成圓滿潔白猶如淨滿之月於此體上想𠶹哩字之心印放光光成八葉蓮花以表八識花上現出自在菩薩為無礙心王菩薩左手執花右手作花葉開勢言因果事理互為遮顯以度生也此花即八識自佛之上別出心花此人人固有者故菩薩思惟有情眾生各具此華個個本來成佛未甞不悟以此觀之則法界本來清淨豈有惑染人人識心情想之中每一識具一如來凡夫心識各有如來則動心亂想何曾不定故八如來皆向心王一齊入定光明朗照其華雖眾生心中之小者然皆與佛不異故其花漸舒各各量周法界眾生之花同佛海會皆為一心無自無他以自心不移而愍眾生故眾生之花蒙自之照而脫苦惱皆同我心矣其所舒之花漸收卷其法界而同己量卷之藏密故復結自在觀音之印既歸一身則四處加持先以唵字加口次以吽字加頂以得囕字加臍以𠶹哩字加心復以阿字加喉卷至一心又於身分口頂心臍一一堅固此定之極則非心可到之境界也入此定時成不思議力堪破地獄之鐵圍堅固黑暗矣其印則鐵圍堅固之象而又即入定堅固之象非有二也將破地獄而觀音作大威勢渾身赤色舌尖印指心口放三處赤光以二手金剛拳下勾上竪作破獄勢加持密呪光觸地獄地獄頓破以眾生三業妄造此獄今以三業真正法力震而摧之霍然而殞矣亦非有二也然而地獄即佛心也豈無主者耶故獄破而地藏出作五供養供地藏畢則轉前赤色威光而為白色悲光從左手𠶹哩字中放光勾引六道至道場中遶佛三匝禮退至壇分六處安處之既安處之乃以堅固印上大悲心字中出光入六道頂令其遍身罪霧蒸現既現其罪狀結成罪山乃以青綠動轉色之觀音於雙指金色怛囉吒字摩動之一聲摧碎其山如微塵相似其不轉之定業非斷所知障之心不能盡空故以心月中𠶹哩印上出青色光照諸罪輩其千佛不通懺之罪因無作想泯彼淨性故心佛眾生三無差別定業無從而着落矣復以白色心種放光入罪人身中如日爍露黑業從足而出流至金剛際謂之懺悔清淨既各清淨只復得本體未滿其嚴故復以妙色身之甘露沃之於無色𠶹哩字想一青蓮華華乃妙心也華中白色阿字空性中也字中流出性水而鬼咽受之清凉無礙復登寶勝之地仍離怖畏得廣博身證妙色身富嚴多寶直至無量之光回而至於入世間之廣大威德自在光明事事無礙皈依自性具足三寶發起阿耨菩提之心而此心乃心佛眾生三無差別融作月輪圓潔無上中有金色阿字如秋毫之末若存若亡四不可得無佛可成無生可度無行可修生死涅槃不知何物一脚踏倒便得真戒矣上猶是戒體未能作用故印中有白色鑁字放光普照有情戒始圓滿即證普賢行身於月輪中紹諸佛職至此地位方堪受佛祖正命之食豈果食而已哉前之戒心了無一念今以食施又屬心有故仍遣魔變空空中掌出紅色威德𠳐字變成空假中三不得之蓮華於威中華想成本潔白色鑁字明點中流出無中生有妙叶之飲食以摩伽陀斛散施無窮甘露無量成酥酪之乳海一切鬼眾皆飽正命食矣又前者障施鬼眾每以智慧之火燒之令退故得成上殊勝之緣今勝緣既成豈障施鬼者為心外物而不攝耶乃總前一切字種以甘露逐一灌諸障鬼前自三寶而地藏至六道而障鬼逐一分齊利益同歸無上菩提至此普同供養凡聖一源復收入𠽾字中作廣大回向極還阿字為大圓相矣嗚呼始從大相空空阿字之體而見𠶹哩本心心中發𠽾之大法界而興吽之萬法每一法上不離唵字之金剛力用究竟堅固本來如是何有諸佛眾生涅槃生死之異哉以吾人一念妄迷致落生死茫不知歸向故上師指出祖師心印令返本還源前後際斷復其相於中指𠶹哩字即見不得不得之唯心心中現𠽾以凾葢乾坤呈吽以拈出無量作用隨波逐浪法法加唵以截斷眾流此之宗旨全是臨濟雲門手段方能廣利無利之道然此宗旨出於西域諸祖相傳東流至於忠國師三傳而為仰山宗旨具有九十七相故知施食一法略見相應之用參禪之旨寧非一大事因緣者哉良以此法迷失宗旨已久茲因究五家宗而及之嗟嗟直截為宗者聞此相應之旨寧不動于中乎施食之法本如來大悲作用𥘾世傳失旨竟類俳倡攙雜歌曲鄙俚不經而三觀妙體置之不問吁可悲也藏弱冠受此法於眾人中年二十九深心學戒願以百堂布施結菩薩緣偶於座下千燈火現觀者驚散因思煩冤之火非觀力不可沃滅以故願中止及參禪十有幾稔之後幽靈群起而請於夢者不一方憶舊願未酬乃考諸石機圖本辨諸雲棲校正細究觀理參合五宗然後勸數禪者熟觀而力行之遂有施食旨槩筆成數葉久矣時一士王文學昌為薦先翁季和先生見而欣然求為如法修設因以所施懺分鏤板以廣告夫真正發菩薩心學施食法者倘人人如法觀施則皆心心相契於九蓮華上請遙質於季和先生時天啟六年正月日三峰法藏記
